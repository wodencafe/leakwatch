name: Bug report
description: Report a problem with LeakWatch runtime behavior, docs, build logic, or samples.
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: Tell us what you expected and what actually happened.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Minimal steps, commands, or sample code that reproduce the issue.
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: LeakWatch version
      placeholder: 0.1.0-SNAPSHOT

  - type: input
    id: java-version
    attributes:
      label: Java version
      placeholder: 17 / 21 / 25

  - type: textarea
    id: notes
    attributes:
      label: Extra notes
      description: Logs, stack traces, and context that may help.
