name: Publish

on:
  workflow_dispatch:
    inputs:
      version:
        description: Artifact version to publish (for example 0.1.0 or 0.1.1-SNAPSHOT). Leave blank to use the version already declared in Gradle.
        required: false
        type: string
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  packages: write

concurrency:
  group: publish-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish-github-packages:
    name: Publish signed artifacts to GitHub Packages
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Resolve publish version
        id: release_version
        shell: bash
        run: |
          set -euo pipefail

          version=""
          if [ -n "${{ inputs.version }}" ]; then
            version="${{ inputs.version }}"
          elif [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            version="${GITHUB_REF_NAME#v}"
          fi

          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Verify release readiness
        shell: bash
        env:
          RELEASE_VERSION: ${{ steps.release_version.outputs.version }}
        run: |
          set -euo pipefail

          args=(verifyReleaseReadiness --stacktrace)
          if [ -n "$RELEASE_VERSION" ]; then
            args+=("-PreleaseVersion=$RELEASE_VERSION")
            if [[ "$RELEASE_VERSION" != *-SNAPSHOT ]]; then
              args+=("-Prelease=true")
            fi
          fi

          ./gradlew "${args[@]}"

      - name: Publish to GitHub Packages
        env:
          ORG_GRADLE_PROJECT_releaseVersion: ${{ steps.release_version.outputs.version }}
          ORG_GRADLE_PROJECT_leakwatchSigningRequired: true
          ORG_GRADLE_PROJECT_signingKeyId: ${{ secrets.MAVEN_GPG_KEY_ID }}
          ORG_GRADLE_PROJECT_signingKey: ${{ secrets.MAVEN_GPG_PRIVATE_KEY }}
          ORG_GRADLE_PROJECT_signingPassword: ${{ secrets.MAVEN_GPG_PASSPHRASE }}
          ORG_GRADLE_PROJECT_githubPackagesUsername: ${{ github.actor }}
          ORG_GRADLE_PROJECT_githubPackagesPassword: ${{ secrets.GITHUB_TOKEN }}
        run: ./gradlew publishReleaseModulesToGitHubPackages --stacktrace
